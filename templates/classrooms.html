{% extends "base.html" %}
{% block content %}
    <h1>Classrooms</h1>
    <a href="{{ url_for('add_classroom') }}" class="btn btn-primary">Add Classroom</a>
    <ul class="list-group mt-3">
        {% for classroom in classrooms %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <a href="{{ url_for('view_classroom', classroom_id=classroom.id) }}">{{ classroom.name }}</a> - {{ classroom.academic_year }}
                <div>
                    <a href="{{ url_for('edit_classroom', classroom_id=classroom.id) }}" class="btn btn-warning btn-sm">Edit</a>
                    <form action="{{ url_for('delete_classroom', classroom_id=classroom.id) }}" method="POST" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
