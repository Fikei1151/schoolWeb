{% extends "base.html" %}
{% block content %}
    <h1>Courses</h1>
    <a href="{{ url_for('add_course') }}" class="btn btn-primary">Add Course</a>
    <ul class="list-group mt-3">
        {% for course in courses %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ course.name }} - {{ course.code }} - {{ course.credit }} credits
                <div>
                    <a href="{{ url_for('edit_course', course_id=course.id) }}" class="btn btn-warning btn-sm">Edit</a>
                    <form action="{{ url_for('delete_course', course_id=course.id) }}" method="POST" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
